name: SonarCloud

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate SonarCloud settings
        run: |
          if [ -z "${{ vars.SONAR_ORGANIZATION }}" ] || [ -z "${{ vars.SONAR_PROJECT_KEY }}" ]; then
            echo "Missing SONAR_ORGANIZATION or SONAR_PROJECT_KEY repository variables."
            echo "Set them in GitHub: Settings > Secrets and variables > Actions > Variables."
            exit 1
          fi
          if [ -z "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "Missing SONAR_TOKEN repository secret."
            echo "Set it in GitHub: Settings > Secrets and variables > Actions > Secrets."
            exit 1
          fi

      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.sources=.
            -Dsonar.exclusions=**/node_modules/**,**/.git/**,**/*.pdf,**/*.JPG
